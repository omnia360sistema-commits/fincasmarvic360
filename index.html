<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Agrícola Marvic 360</title>
    <meta name="description" content="ERP agrícola — gestión integral de Fincas Marvic" />

    <!-- PWA -->
    <meta name="theme-color" content="#030712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Marvic 360" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/icon-192.png" color="#38bdf8" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Agrícola Marvic 360" />
    <meta property="og:description" content="ERP agrícola — gestión integral de Fincas Marvic" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <style>
      /* Estilos para la Pantalla de Carga de Alto Impacto (Paso 1.3) */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-color: #030712; /* Fondo casi negro para máximo contraste */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 1s ease, visibility 1s;
        overflow: hidden;
      }

      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center; /* CENTRADO HORIZONTAL DE TODOS LOS ELEMENTOS */
        text-align: center; /* CENTRADO DE TEXTO INTERNO */
        gap: 20px;
        position: relative;
      }

      /* LOGO LINEAL CON ANIMACIÓN DE ESCANEO */
      .svg-logo {
        width: clamp(100px, 20vw, 160px); /* Responsive */
        height: auto;
        opacity: 0;
        animation: entradaImpacto 1.2s forwards;
      }

      .logo-trazo {
        fill: none;
        stroke: #38bdf8; /* Azul Metalizado */
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6));
        
        /* Animación combinada: dibujo + resplandor */
        animation: logoGlow 3s infinite ease-in-out 1.2s;
      }

      /* TEXTO AGROGESTIÓN CON EFECTO SHIMMER (BRILLO RECORRIENTE) */
      .logo-texto {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        font-size: clamp(2.5rem, 10vw, 4rem);
        font-weight: 800;
        text-transform: uppercase;
        margin: 0;
        letter-spacing: 3px;
        line-height: 1;
        opacity: 0;
        animation: entradaImpacto 1s forwards 0.3s;
        
        /* Configuración para el efecto Shimmer */
        background: linear-gradient(110deg, #38bdf8 40%, #e0f2fe 50%, #38bdf8 60%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
        animation: entradaImpacto 1s forwards 0.3s, textShimmer 3s infinite linear 1.5s;
        
        /* Sutil sombra para dar profundidad */
        -webkit-text-stroke: 1px rgba(56, 189, 248, 0.2);
      }

      /* SUBTÍTULO: AHORA PERFECTAMENTE CENTRADO */
      .subtitulo {
        color: #94a3b8; /* Gris azulado suave */
        font-family: inherit;
        font-size: clamp(0.7rem, 3vw, 1rem);
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
        opacity: 0;
        /* Animación de entrada con retraso */
        animation: entradaImpacto 1s forwards 0.8s;
        
        /* Asegurando que ocupe todo el ancho para centrarse respecto al contenedor */
        width: 100%;
      }

      /* --- ANIMACIONES DE ALTO IMPACTO --- */

      /* Entrada con zoom y desvanecimiento */
      @keyframes entradaImpacto {
        from { opacity: 0; transform: scale(0.9) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* Efecto de respiración del resplandor del logo */
      @keyframes logoGlow {
        0%, 100% { filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6)); stroke-width: 2.5; }
        50% { filter: drop-shadow(0 0 25px rgba(224, 242, 254, 0.9)); stroke-width: 3; }
      }

      /* Efecto Shimmer: Brillo que recorre el texto */
      @keyframes textShimmer {
        to { background-position: 200% center; }
      }

      /* Clase para ocultar suavemente la pantalla */
      .splash-hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>

  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <svg class="svg-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path class="logo-trazo" d="M20 20 L20 80 L80 80 L80 20 Z" />
          <path class="logo-trazo" d="M35 35 L65 35 L65 65 L35 65 Z" />
          <path class="logo-trazo" d="M20 50 L35 50" />
          <path class="logo-trazo" d="M65 50 L80 50" />
          <path class="logo-trazo" d="M50 20 L50 35" />
          <path class="logo-trazo" d="M50 65 L50 80" />
          <path class="logo-trazo" d="M10 50 A40 40 0 1 1 50 90" />
          <path class="logo-trazo" d="M90 50 A40 40 0 1 1 50 10" />
        </svg>

        <h1 class="logo-texto">AgroGestión</h1>
        <p class="subtitulo">INTELIGENCIA AGRÍCOLA CIRCULAR</p>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        // Mantenemos el splash 4.5 segundos para disfrutar de la animación completa
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          splash.classList.add('splash-hidden');
        }, 4500);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
