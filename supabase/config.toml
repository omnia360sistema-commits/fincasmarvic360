# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "fincasmarvic-main"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false # DESACTIVADO: Los seeds consumen mucha RAM al arrancar

[db.network_restrictions]
enabled = false

[realtime]
enabled = false # DESACTIVADO PARA AHORRAR RAM

[studio]
enabled = false
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false # DESACTIVADO PARA AHORRAR RAM

[storage]
enabled = false # DESACTIVADO: Este era el que daba error "unhealthy" por falta de memoria

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = false # DESACTIVADO PARA AHORRAR RAM

[analytics]
enabled = false # DESACTIVADO PARA AHORRAR RAM

[experimental]
orioledb_version = ""